    <style>
        html,
        body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background: #000;
        }

        main {
            position: relative;
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
        }

        main > section:first-child {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
        }

        main > section:first-child img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.45);
        }

        main::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 28%),
                radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.05), transparent 32%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.86));
            pointer-events: none;
        }

        .photo-wall {
            width: 100%;
            max-width: 100vw;
            padding: 150px clamp(18px, 5vw, 70px) 120px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .photo-wall > div {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 26px;
        }

        .photo-wall > div::before {
            content: "Photo Archive";
            grid-column: 1 / -1;
            display: block;
            margin-bottom: -8px;
            font-family: "Fira Code", monospace;
            font-size: 15px;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .photo-wall > div::after {
            content: "Stealth의 순간들을 기록한 사진 페이지";
            grid-column: 1 / -1;
            display: block;
            margin-bottom: 24px;
            font-family: "SUIT", sans-serif;
            font-size: clamp(30px, 5vw, 58px);
            font-weight: 800;
            line-height: 1.1;
            color: #fff;
            text-shadow: 0 0 24px rgba(255, 255, 255, 0.18);
            word-break: keep-all;
        }

        .photo {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            min-height: auto;
            margin: 0;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 22px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.075);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow:
                0 18px 54px rgba(0, 0, 0, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.16);
            transition:
                transform 0.35s ease,
                box-shadow 0.35s ease,
                border-color 0.35s ease;
        }

        .photo:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.34);
            box-shadow:
                0 26px 70px rgba(0, 0, 0, 0.52),
                0 0 34px rgba(255, 255, 255, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .photo h2 {
            order: 2;
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            min-height: 80px;
            margin: 0;
            padding: 16px 18px 20px;
            box-sizing: border-box;
            overflow-wrap: break-word;
            font-family: "SUIT", sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.35;
            color: #fff;
            word-break: keep-all;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.035)),
                rgba(0, 0, 0, 0.28);
        }

        .photo h2::before {
            content: "PHOTO";
            display: block;
            width: fit-content;
            margin-bottom: 8px;
            padding: 5px 9px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            font-family: "Fira Code", monospace;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.22);
        }

        .photo img {
            order: 1;
            display: block;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            height: 230px;
            min-height: 0;
            object-fit: cover;
            box-sizing: border-box;
            filter: saturate(1.06) contrast(1.04);
            transition:
                transform 0.55s ease,
                filter 0.55s ease;
        }

        .photo:hover img {
            transform: scale(1.045);
            filter: saturate(1.16) contrast(1.08) brightness(1.04);
        }

        .photo::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.22));
        }

        .photo-empty,
        .photo-loading {
            grid-column: 1 / -1;
            padding: 60px 30px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 22px;
            color: rgba(255, 255, 255, 0.75);
            font-family: "SUIT", sans-serif;
            font-size: 18px;
            text-align: center;
            background: rgba(255, 255, 255, 0.075);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        @media (max-width: 1000px) {
            .photo-wall {
                padding: 130px clamp(18px, 5vw, 48px) 100px;
            }

            .photo-wall > div {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .photo-wall {
                padding: 120px 18px 90px;
            }

            .photo-wall > div {
                grid-template-columns: minmax(0, 1fr);
                gap: 22px;
            }

            .photo img {
                height: 240px;
            }

            .photo h2 {
                min-height: auto;
                font-size: 16px;
                padding: 16px 18px 20px;
            }
        }
    </style>
</head>

    <script>
        const photoContainer = document.getElementById("photoContainer");

        const photos = [
            "2024_4_13.jpg",
            "2024_6_10.jpg",
            "2025_4_10.jpg",
            "2025_DEFCON.jpg",
            "2025_IT세미나_김여름.jpg",
            "2025_IT세미나_김준원.jpg",
            "2025_IT세미나_문정빈.jpg",
            "2025_IT세미나_박성현.jpg",
            "2025_IT세미나_박찬완.jpg",
            "2025_IT세미나_이호연.jpg",
            "2025_입설-pandas.jpg",
            "HCTF.jpg",
            "HSPACE.jpg",
            "Holy@@@.jpg",
            "dothack.jpg",
            "dothack_bpak.jpg",
            "dothack_stealth.jpg",
            "eleccon.jpg",
            "ssd_all.jpg",
            "소고기.jpg",
            "입설.jpg",
            "코게.jpg"
        ];

        function formatTitle(filename) {
            const name = filename.replace(/\.[^/.]+$/, "");

            const titleMap = {
                "2024_4_13": "2024년 4월 13일",
                "2024_6_10": "2024년 6월 10일",
                "2025_4_10": "2025년 4월 10일",
                "2025_DEFCON": "2025 DEFCON",
                "2025_IT세미나_김여름": "IT 세미나 - 김여름",
                "2025_IT세미나_김준원": "IT 세미나 - 김준원",
                "2025_IT세미나_문정빈": "IT 세미나 - 문정빈",
                "2025_IT세미나_박성현": "IT 세미나 - 박성현",
                "2025_IT세미나_박찬완": "IT 세미나 - 박찬완",
                "2025_IT세미나_이호연": "IT 세미나 - 이호연",
                "2025_입설-pandas": "입설 - pandas",
                "HCTF": "HCTF",
                "HSPACE": "HSPACE",
                "Holy@@@": "Holy @@@",
                "dothack": "DotHack",
                "dothack_bpak": "DotHack - BPAK",
                "dothack_stealth": "DotHack - STEALTH",
                "eleccon": "ElecCon",
                "ssd_all": "SSD 전체 사진",
                "소고기": "소고기",
                "입설": "입설",
                "코게": "코드게이트"
            };

            return titleMap[name] || name
                .replace(/[_-]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function createPhotoCard(filename) {
            const photoCard = document.createElement("div");
            photoCard.className = "photo";

            const img = document.createElement("img");
            img.src = `./images/photos/${filename}`;
            img.alt = formatTitle(filename);
            img.loading = "lazy";

            const title = document.createElement("h2");
            title.textContent = formatTitle(filename);

            photoCard.appendChild(img);
            photoCard.appendChild(title);

            return photoCard;
        }

        function loadPhotos() {
            photoContainer.innerHTML = "";

            photos.forEach(filename => {
                photoContainer.appendChild(createPhotoCard(filename));
            });

            if (photos.length === 0) {
                photoContainer.innerHTML = `<p class="photo-empty">아직 등록된 사진이 없습니다.</p>`;
            }
        }

        loadPhotos();
    </script>
